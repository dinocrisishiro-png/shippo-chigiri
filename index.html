<script>
"use strict";

// ---------- setup ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

const BEST_KEY = "shippo-chigiri-best";
const GAME_TIME = 60;
const MAX_PENGUINS = 5;
const MIN_PENGUINS = 3;         // 画面に常時いる最低数
const SPAWN_MIN = 2, SPAWN_MAX = 5; // スポーン間隔(秒)
const BLINK_WARN_SEC = 1.5;         // 消滅前の点滅警告
const FADE_SEC = 0.5;               // 時間切れフェードアウト

// ---------- color variants ----------
// rate: 出現率 / points: ちぎり基礎点 / life: 出現からの寿命(秒)
// tint: 起動時にオフスクリーンCanvasで生成する色調変換の設定
// shape: 図形フォールバック時の色 / ui: 凡例ドット / pop: スコアポップ色
// （ちぎられた個体はフェードアウトして退場するので、しっぽ再生は無い）
const VARIANTS = {
  black: {
    key: "black", name: "黒", rate: 0.60, points: 100, life: Infinity,
    tint: null,
    shape: { body: "#2c3e50", flipper: "#22303e", tail: "#2c3e50" },
    ui: "#2c3e50", pop: "#ffd76a",
  },
  red: {
    key: "red", name: "赤", rate: 0.25, points: 300, life: 8,
    tint: { color: "#ff2d20", alpha: 0.8 },
    shape: { body: "#b03530", flipper: "#7c221c", tail: "#b03530" },
    ui: "#ff5a4d", pop: "#ff8a7a",
  },
  blue: {
    key: "blue", name: "青", rate: 0.12, points: 500, life: 6,
    tint: { color: "#2f7bff", alpha: 0.8 },
    shape: { body: "#2c55a8", flipper: "#1a4082", tail: "#2c55a8" },
    ui: "#4d8cff", pop: "#8fd4ff",
  },
  white: {
    key: "white", name: "白", rate: 0.03, points: 2000, life: 4,
    tint: { color: "#ffffff", alpha: 0.82 },
    shape: { body: "#d3e2ee", flipper: "#aebfce", tail: "#d3e2ee" },
    ui: "#ffffff", pop: "#ffffff",
  },
};

function pickVariant() {
  let r = Math.random();
  for (const v of Object.values(VARIANTS)) {
    r -= v.rate;
    if (r < 0) return v;
  }
  return VARIANTS.black;
}

// ---------- sprites ----------
// アンカーは画像内の相対座標(0..1)で定義する
// 体は正面向きの1枚のみ。警戒は「！」オーバーレイで表現し、
// 左向き移動時は左右ミラーで対応する
const SPRITE_DEFS = {
  idle: {
    src: "assets/gugugaga_idle.png",
    butt: { x: 0.5, y: 0.85 }, // しっぽ付け根(お尻)の相対座標
  },
  tail: {
    src: "assets/tail.png",
    attach: { x: 0.86, y: 0.5 }, // 付け根側
    grab:   { x: 0.15, y: 0.5 }, // 掴み判定アンカー(先端)
  },
};
const BODY_DRAW_H = 132; // 体スプライトの描画高さ(px)。幅は画像アスペクト比から
const TAIL_DRAW_W = 68;
const TAIL_DRAW_H = 44;

const sprites = {};
const tinted = {}; // variant key -> { idle, tail } (色調変換済みオフスクリーンCanvas)
let spritesReady = false; // 1枚でもロード失敗したらfalseのまま→図形描画にフォールバック

// screen合成で明度を持ち上げつつ着色し、元画像のアルファでマスクし直す。
// 毎フレームのfilter適用を避けるため起動時に一度だけ生成する（スマホ性能優先）
function tintImage(img, color, alpha) {
  const c = document.createElement("canvas");
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const g = c.getContext("2d");
  g.drawImage(img, 0, 0);
  g.globalCompositeOperation = "screen";
  g.globalAlpha = alpha;
  g.fillStyle = color;
  g.fillRect(0, 0, c.width, c.height);
  g.globalAlpha = 1;
  g.globalCompositeOperation = "destination-in";
  g.drawImage(img, 0, 0);
  return c;
}

function buildTintedSprites() {
  for (const v of Object.values(VARIANTS)) {
    if (!v.tint) continue;
    tinted[v.key] = {
      idle: tintImage(sprites.idle, v.tint.color, v.tint.alpha),
      tail: tintImage(sprites.tail, v.tint.color, v.tint.alpha),
    };
  }
}

{
  let pending = Object.keys(SPRITE_DEFS).length;
  let failed = false;
  for (const [key, def] of Object.entries(SPRITE_DEFS)) {
    const img = new Image();
    img.onload = () => {
      if (--pending === 0 && !failed) {
        buildTintedSprites();
        spritesReady = true;
      }
    };
    img.onerror = () => { failed = true; console.warn(`sprite load failed: ${def.src} — 図形描画にフォールバック`); };
    img.src = def.src;
    sprites[key] = img;
  }
}

function spriteImg(p, kind) {
  const t = tinted[p.v.key];
  return t ? t[kind] : sprites[kind];
}

// penguin state machine
const S = { NONBIRI: "nonbiri", KEIKAI: "keikai", TOSO: "toso", HOKAKU: "hokaku" };

const game = {
  running: false,
  time: GAME_TIME,
  score: 0,
  combo: 0,
  best: Number(localStorage.getItem(BEST_KEY) || 0),
};

let penguins = [];
const spawner = { timer: 0 };

const pointer = {
  x: -999, y: -999,
  px: -999, py: -999,
  vx: 0, vy: 0,
  speed: 0,
  down: false,
  id: null,
};

const grab = {
  active: false,
  p: null,           // 掴んでいるペンギン
  tension: 0,        // 0..1
};

let particles = [];
let popups = [];     // floating texts
let rings = [];      // 白出現時のキラッとエフェクト

// ---------- helpers ----------
const rand = (a, b) => a + Math.random() * (b - a);
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

function bodySpriteRect(p) {
  // 足元を影の位置に接地させた体スプライトの配置
  const img = sprites.idle;
  const h = BODY_DRAW_H;
  const w = h * img.naturalWidth / img.naturalHeight;
  const footY = p.y + p.r + 6;
  return { w, h, top: footY - h };
}

function tailTransform(p) {
  // しっぽ付け根のワールド座標と回転。tail.pngは左向き(先端が-x側)なので
  // facing方向にそのまま回転させると先端が後ろへ突き出る
  const wig = Math.sin(p.waddle * 1.5) * 0.25;
  if (spritesReady) {
    // 付け根 = 体スプライトのお尻位置(相対座標アンカー)
    const b = bodySpriteRect(p);
    const butt = SPRITE_DEFS.idle.butt;
    const mirror = Math.cos(p.angle) < 0;
    return {
      x: p.x + (butt.x - 0.5) * b.w * (mirror ? -1 : 1),
      y: b.top + butt.y * b.h,
      rot: p.angle + wig,
    };
  }
  return {
    x: p.x - Math.cos(p.angle) * (p.r - 6),
    y: p.y - Math.sin(p.angle) * (p.r - 6),
    rot: p.angle + wig,
  };
}

function tailPos(p) {
  if (spritesReady) {
    // 画像内の相対座標アンカー(grab)をワールド座標へ変換
    const def = SPRITE_DEFS.tail;
    const t = tailTransform(p);
    const lx = (def.grab.x - def.attach.x) * TAIL_DRAW_W;
    const ly = (def.grab.y - def.attach.y) * TAIL_DRAW_H;
    return {
      x: t.x + Math.cos(t.rot) * lx - Math.sin(t.rot) * ly,
      y: t.y + Math.sin(t.rot) * lx + Math.cos(t.rot) * ly,
    };
  }
  // フォールバック(図形描画)時: 体の後方に固定オフセット
  return {
    x: p.x - Math.cos(p.angle) * (p.r + 14),
    y: p.y - Math.sin(p.angle) * (p.r + 14),
  };
}

function pickWanderTarget(p) {
  const m = 70;
  p.targetX = rand(m, W - m);
  p.targetY = rand(m, H - m);
}

function setState(p, s, t = 0) {
  p.state = s;
  p.stateTimer = t;
}

// ---------- spawning ----------
function makePenguin(v, x, y) {
  const p = {
    v,
    x, y,
    angle: rand(0, Math.PI * 2), // facing direction
    speed: 0,
    state: S.NONBIRI,
    stateTimer: 0,
    targetX: 0, targetY: 0,
    hasTail: true,
    waddle: rand(0, 10),
    r: 26,             // body radius
    life: v.life,      // 出現からの残り寿命(秒)
    fading: false,
    fade: 0,
    dead: false,
  };
  pickWanderTarget(p);
  return p;
}

function spawnPos() {
  // ポインタや既存ペンギンの真上に湧かないよう数回リトライ
  const m = 70;
  for (let i = 0; i < 12; i++) {
    const x = rand(m, W - m), y = rand(m, H - m);
    if (dist(x, y, pointer.x, pointer.y) < 140) continue;
    if (penguins.some((p) => dist(x, y, p.x, p.y) < 120)) continue;
    return { x, y };
  }
  return { x: rand(m, W - m), y: rand(m, H - m) };
}

function spawnPenguin(variant) {
  const v = variant || pickVariant();
  const pos = spawnPos();
  const p = makePenguin(v, pos.x, pos.y);
  penguins.push(p);
  if (v.key === "white") sparkle(p.x, p.y - 40); // 白はキラッと登場
  return p;
}

function scheduleSpawn() {
  spawner.timer = rand(SPAWN_MIN, SPAWN_MAX);
}

function updateSpawner(dt) {
  // 最低数を割ったら即補充（常時MIN_PENGUINS体以上を画面に保証）
  if (penguins.length < MIN_PENGUINS) {
    while (penguins.length < MIN_PENGUINS) spawnPenguin();
    scheduleSpawn();
    return;
  }
  spawner.timer -= dt;
  if (spawner.timer <= 0) {
    if (penguins.length < MAX_PENGUINS) spawnPenguin();
    scheduleSpawn();
  }
}

function resetPenguins() {
  penguins = [makePenguin(VARIANTS.black, W / 2, H / 2)];
  scheduleSpawn();
}

// ---------- pointer events (mouse / touch unified) ----------
canvas.addEventListener("pointerdown", (e) => {
  if (!game.running) return;
  if (pointer.id !== null) return;
  pointer.id = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  pointer.down = true;
  pointer.x = pointer.px = e.clientX;
  pointer.y = pointer.py = e.clientY;

  // try to grab the nearest tail
  let target = null, targetD = 42;
  for (const p of penguins) {
    if (!p.hasTail || p.fading || p.state === S.HOKAKU) continue;
    const t = tailPos(p);
    const d = dist(e.clientX, e.clientY, t.x, t.y);
    if (d < targetD) { target = p; targetD = d; }
  }
  if (target) {
    grab.active = true;
    grab.p = target;
    grab.tension = 0;
    setState(target, S.HOKAKU);
    const t = tailPos(target);
    popup(t.x, t.y - 30, "つかんだ！", "#8fd4ff");
  }
});

canvas.addEventListener("pointermove", (e) => {
  if (pointer.id !== null && e.pointerId !== pointer.id) return;
  pointer.x = e.clientX;
  pointer.y = e.clientY;
});

function releasePointer(e) {
  if (e.pointerId !== pointer.id) return;
  pointer.id = null;
  pointer.down = false;
  if (grab.active) {
    // let go before tearing -> penguin escapes
    const p = grab.p;
    grab.active = false;
    grab.p = null;
    grab.tension = 0;
    game.combo = 0;
    popup(p.x, p.y - 50, "にげられた…", "#aab6c2");
    setState(p, S.TOSO, 1.2);
  }
}
canvas.addEventListener("pointerup", releasePointer);
canvas.addEventListener("pointercancel", releasePointer);

// ---------- effects ----------
function popup(x, y, text, color) {
  popups.push({ x, y, text, color, life: 1 });
}

function burst(x, y) {
  for (let i = 0; i < 26; i++) {
    const a = rand(0, Math.PI * 2);
    const sp = rand(60, 320);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: rand(0.5, 1),
      color: Math.random() < 0.5 ? "#ffd76a" : "#ffffff",
      r: rand(2, 5),
    });
  }
}

function sparkle(x, y) {
  // 白出現時のキラッと（拡がる光輪 + 光の粒）。音は鳴らさない
  rings.push({ x, y, life: 0.6, max: 0.6 });
  for (let i = 0; i < 22; i++) {
    const a = rand(0, Math.PI * 2);
    const sp = rand(40, 200);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 60,
      life: rand(0.4, 0.8),
      color: Math.random() < 0.5 ? "#ffffff" : "#fff3b0",
      r: rand(1.5, 3.5),
    });
  }
}

// ---------- tear! ----------
function tear(p) {
  const t = tailPos(p);
  p.hasTail = false;
  grab.active = false;
  grab.p = null;
  grab.tension = 0;
  game.combo++;
  const pts = p.v.points * game.combo;
  game.score += pts;
  playPluck();
  burst(t.x, t.y);
  popup(t.x, t.y - 20, "ちぎり！", "#ff6a8a");
  popup(t.x, t.y - 56, `+${pts}` + (game.combo > 1 ? ` (x${game.combo})` : ""), p.v.pop);
  // ちぎられたググガガはフェードアウトして退場（次のスポーンはspawnerが補充）
  startFade(p);
}

// ---------- update ----------
function updatePointer(dt) {
  if (dt > 0) {
    pointer.vx = (pointer.x - pointer.px) / dt;
    pointer.vy = (pointer.y - pointer.py) / dt;
    pointer.speed = Math.hypot(pointer.vx, pointer.vy);
  }
  pointer.px = pointer.x;
  pointer.py = pointer.y;
}

function startFade(p) {
  p.fading = true;
  p.fade = FADE_SEC;
  if (grab.p === p) {
    // 掴んでいる最中に寿命切れ: 手からすり抜けて消える(コンボは維持)
    grab.active = false;
    grab.p = null;
    grab.tension = 0;
    popup(p.x, p.y - 50, "きえちゃった…", "#aab6c2");
  }
}

function updatePenguin(p, dt) {
  // lifetime (色付きバリアントのみ有限)
  if (p.fading) {
    p.fade -= dt;
    if (p.fade <= 0) p.dead = true;
    return;
  }
  if (isFinite(p.life)) {
    p.life -= dt;
    if (p.life <= 0) {
      startFade(p);
      return;
    }
  }

  p.stateTimer -= dt;
  p.waddle += dt * 10;

  const dToPointer = dist(p.x, p.y, pointer.x, pointer.y);

  switch (p.state) {
    case S.NONBIRI: {
      // waddle toward wander target
      const d = dist(p.x, p.y, p.targetX, p.targetY);
      if (d < 20) pickWanderTarget(p);
      const a = Math.atan2(p.targetY - p.y, p.targetX - p.x);
      p.angle += Math.atan2(Math.sin(a - p.angle), Math.cos(a - p.angle)) * dt * 3;
      p.speed = 45;
      // notice a fast-approaching pointer
      if (dToPointer < 160 && pointer.speed > 350) {
        setState(p, S.KEIKAI, 0.45);
        p.speed = 0;
      }
      break;
    }
    case S.KEIKAI: {
      // freeze with "!" then flee
      p.speed = 0;
      if (p.stateTimer <= 0) setState(p, S.TOSO, 1.5);
      break;
    }
    case S.TOSO: {
      // run away from the pointer
      const a = Math.atan2(p.y - pointer.y, p.x - pointer.x);
      p.angle += Math.atan2(Math.sin(a - p.angle), Math.cos(a - p.angle)) * dt * 8;
      p.speed = 240;
      // keep fleeing while the pointer stays close
      if (dToPointer < 200) p.stateTimer = Math.max(p.stateTimer, 0.5);
      if (p.stateTimer <= 0) {
        setState(p, S.NONBIRI);
        pickWanderTarget(p);
      }
      break;
    }
    case S.HOKAKU: {
      // caught by the tail: struggles away from the pointer
      const fleeA = Math.atan2(p.y - pointer.y, p.x - pointer.x);
      p.angle = fleeA;
      p.speed = 30;
      p.x += Math.cos(fleeA + Math.sin(p.waddle * 3) * 0.6) * 40 * dt;

      // tension: drag opposite to the flee direction
      const t = tailPos(p);
      const pullX = pointer.x - t.x;
      const pullY = pointer.y - t.y;
      const pullLen = Math.hypot(pullX, pullY);
      if (pullLen > 8) {
        // alignment: 1 when pulling exactly opposite to flee direction
        const align = -(Math.cos(fleeA) * pullX + Math.sin(fleeA) * pullY) / pullLen;
        if (align > 0.3) {
          grab.tension += align * clamp(pullLen / 90, 0, 1.6) * dt * 0.9;
        }
      }
      grab.tension -= dt * 0.25; // constant decay
      grab.tension = clamp(grab.tension, 0, 1);
      if (grab.tension >= 1) tear(p);

      // dragged too far -> slips out of your hand
      if (pullLen > 220) {
        grab.active = false;
        grab.p = null;
        grab.tension = 0;
        game.combo = 0;
        popup(t.x, t.y - 30, "すっぽ抜けた！", "#aab6c2");
        setState(p, S.TOSO, 1.2);
      }
      break;
    }
  }

  // move
  if (p.state !== S.HOKAKU) {
    p.x += Math.cos(p.angle) * p.speed * dt;
    p.y += Math.sin(p.angle) * p.speed * dt;
  }

  // stay on screen
  const m = 40;
  if (p.x < m || p.x > W - m || p.y < m || p.y > H - m) {
    p.x = clamp(p.x, m, W - m);
    p.y = clamp(p.y, m, H - m);
    if (p.state === S.TOSO) {
      // bounce along the wall
      p.angle = Math.atan2(H / 2 - p.y, W / 2 - p.x) + rand(-0.8, 0.8);
    } else if (p.state === S.NONBIRI) {
      pickWanderTarget(p);
    }
  }
}

function updatePenguins(dt) {
  for (const p of penguins) updatePenguin(p, dt);
  penguins = penguins.filter((p) => !p.dead);
}

function updateEffects(dt) {
  particles = particles.filter((p) => {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt;
    return p.life > 0;
  });
  popups = popups.filter((p) => {
    p.life -= dt * 0.8;
    p.y -= 40 * dt;
    return p.life > 0;
  });
  rings = rings.filter((r) => {
    r.life -= dt;
    return r.life > 0;
  });
}

// ---------- draw ----------
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#12324a");
  g.addColorStop(1, "#0b1d2a");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // ice floor
  ctx.fillStyle = "rgba(210, 235, 255, 0.07)";
  for (let i = 0; i < 5; i++) {
    const y = (H / 5) * i + 40;
    ctx.beginPath();
    ctx.ellipse(W * ((i * 0.37) % 1), y, 120, 26, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function penguinAlpha(p) {
  if (p.fading) return clamp(p.fade / FADE_SEC, 0, 1);
  // 消滅の1.5秒前から点滅で警告
  if (isFinite(p.life) && p.life < BLINK_WARN_SEC) {
    return Math.floor(p.life * 8) % 2 === 0 ? 1 : 0.25;
  }
  return 1;
}

function drawPenguin(p) {
  const bob = p.speed > 1 ? Math.sin(p.waddle) * 2.5 : 0;

  ctx.globalAlpha = penguinAlpha(p);

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + p.r + 8, p.r * 0.9, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  if (spritesReady) drawPenguinSprite(p, bob);
  else drawPenguinShapes(p, bob);

  drawPenguinOverlays(p, bob);

  ctx.globalAlpha = 1;
}

function drawTailSprite(p, tt, bob, scale) {
  const def = SPRITE_DEFS.tail;
  const w = TAIL_DRAW_W * scale;
  const h = TAIL_DRAW_H * scale;
  ctx.save();
  ctx.translate(tt.x, tt.y + bob);
  ctx.rotate(tt.rot);
  ctx.drawImage(spriteImg(p, "tail"), -def.attach.x * w, -def.attach.y * h, w, h);
  ctx.restore();
}

function drawPenguinSprite(p, bob) {
  // しっぽを体より先に描く（ちぎられた後はしっぽなしのままフェードアウト）
  const tt = tailTransform(p);
  if (p.hasTail) {
    drawTailSprite(p, tt, bob, 1);
    if (grab.active && grab.p === p) {
      const g = tailPos(p);
      ctx.fillStyle = "rgba(255, 180, 94, 0.35)";
      ctx.beginPath();
      ctx.arc(g.x, g.y + bob, 20, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 正面向きスプライトは回転させず、左向き移動時だけ左右ミラー
  const b = bodySpriteRect(p);
  ctx.save();
  ctx.translate(p.x, p.y + bob);
  if (Math.cos(p.angle) < 0) ctx.scale(-1, 1);
  ctx.drawImage(spriteImg(p, "idle"), -b.w / 2, b.top - p.y, b.w, b.h);
  ctx.restore();
}

function drawPenguinShapes(p, bob) {
  const { x, y, angle } = p;
  const col = p.v.shape;

  ctx.save();
  ctx.translate(x, y + bob);

  // tail (behind body)
  if (p.hasTail) {
    const ta = angle + Math.PI;
    const wig = Math.sin(p.waddle * 1.5) * 0.25;
    ctx.save();
    ctx.rotate(ta + wig);
    ctx.fillStyle = grab.active && grab.p === p ? "#ffb45e" : col.tail;
    ctx.beginPath();
    ctx.moveTo(p.r - 6, 0);
    ctx.lineTo(p.r + 20, -9);
    ctx.lineTo(p.r + 20, 9);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // body
  ctx.fillStyle = col.body;
  ctx.beginPath();
  ctx.ellipse(0, 0, p.r * 0.85, p.r, 0, 0, Math.PI * 2);
  ctx.fill();

  // belly
  ctx.fillStyle = "#f4f9fd";
  ctx.beginPath();
  ctx.ellipse(Math.cos(angle) * 7, Math.sin(angle) * 7 + 4, p.r * 0.55, p.r * 0.68, 0, 0, Math.PI * 2);
  ctx.fill();

  // flippers
  const flap = p.state === S.HOKAKU ? Math.sin(p.waddle * 4) * 0.7 : Math.sin(p.waddle) * 0.15;
  ctx.fillStyle = col.flipper;
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.rotate(angle + side * (Math.PI / 2 + flap * side));
    ctx.beginPath();
    ctx.ellipse(p.r * 0.55, 0, 7, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // head
  const hx = Math.cos(angle) * p.r * 0.72;
  const hy = Math.sin(angle) * p.r * 0.72 - 14;
  ctx.fillStyle = col.body;
  ctx.beginPath();
  ctx.arc(hx, hy, 14, 0, Math.PI * 2);
  ctx.fill();

  // beak
  ctx.fillStyle = "#f5a623";
  ctx.save();
  ctx.translate(hx, hy);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(10, -4);
  ctx.lineTo(22, 0);
  ctx.lineTo(10, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // eyes（引っ張られている間は嫌がる顔に差し替え）
  if (p.state === S.HOKAKU) {
    drawAnnoyedFace(hx, hy, p.r * 0.95);
  } else {
    ctx.fillStyle = "#fff";
    const ex = Math.cos(angle + 0.5) * 9, ey = Math.sin(angle + 0.5) * 9;
    const ex2 = Math.cos(angle - 0.5) * 9, ey2 = Math.sin(angle - 0.5) * 9;
    ctx.beginPath();
    ctx.arc(hx + ex, hy + ey, 4, 0, Math.PI * 2);
    ctx.arc(hx + ex2, hy + ey2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(hx + ex, hy + ey, 2, 0, Math.PI * 2);
    ctx.arc(hx + ex2, hy + ey2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// 引っ張られて嫌がっている表情（＞＜の目・食いしばった口・汗・怒りマーク💢）を
// 現在の座標系の (cx, cy) を顔の中心として描く。faceW は顔のおよその横幅(px)
function drawAnnoyedFace(cx, cy, faceW) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  const e = faceW * 0.14;    // 目の大きさ
  const dx = faceW * 0.19;   // 目の左右オフセット
  const eyeY = -faceW * 0.06;
  const mouthY = faceW * 0.12;

  // ＞＜ にギュッとつむった目
  ctx.strokeStyle = "#241a14";
  ctx.lineWidth = Math.max(2.5, faceW * 0.055);
  ctx.beginPath();
  ctx.moveTo(-dx - e, eyeY - e); ctx.lineTo(-dx + e * 0.5, eyeY); ctx.lineTo(-dx - e, eyeY + e); // 左 ">"
  ctx.moveTo(dx + e, eyeY - e);  ctx.lineTo(dx - e * 0.5, eyeY);  ctx.lineTo(dx + e, eyeY + e);  // 右 "<"
  ctx.stroke();

  // 食いしばった口（ギザギザ）
  const mw = faceW * 0.34, mh = faceW * 0.06, n = 5;
  ctx.lineWidth = Math.max(2, faceW * 0.045);
  ctx.beginPath();
  ctx.moveTo(-mw / 2, mouthY);
  for (let i = 1; i <= n; i++) {
    ctx.lineTo(-mw / 2 + mw * (i / n), mouthY + (i % 2 ? mh : -mh));
  }
  ctx.stroke();

  // 汗のしずく（右上）
  const sx = dx + faceW * 0.26, sy = eyeY - faceW * 0.12;
  ctx.fillStyle = "rgba(130, 200, 255, 0.92)";
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.quadraticCurveTo(sx + faceW * 0.055, sy + faceW * 0.06, sx, sy + faceW * 0.12);
  ctx.quadraticCurveTo(sx - faceW * 0.055, sy + faceW * 0.06, sx, sy);
  ctx.fill();

  // 怒りマーク 💢（左上）
  const ax = -dx - faceW * 0.16, ay = eyeY - faceW * 0.20, a = faceW * 0.08;
  ctx.strokeStyle = "rgba(232, 64, 64, 0.95)";
  ctx.lineWidth = Math.max(1.5, faceW * 0.03);
  ctx.beginPath();
  ctx.moveTo(ax - a, ay); ctx.lineTo(ax + a, ay);
  ctx.moveTo(ax, ay - a); ctx.lineTo(ax, ay + a);
  ctx.moveTo(ax - a * 0.7, ay - a * 0.7); ctx.lineTo(ax + a * 0.7, ay + a * 0.7);
  ctx.moveTo(ax + a * 0.7, ay - a * 0.7); ctx.lineTo(ax - a * 0.7, ay + a * 0.7);
  ctx.stroke();

  ctx.restore();
}

function drawPenguinOverlays(p, bob) {
  const { x, y } = p;

  // 引っ張られている間はスプライトの顔に嫌がる表情を重ねる
  if (p.state === S.HOKAKU && spritesReady) {
    const b = bodySpriteRect(p);
    drawAnnoyedFace(x, b.top + bob + b.h * 0.40, b.w * 0.62);
  }

  // "!" alert mark (スプライトの頭上に出す)
  if (p.state === S.KEIKAI) {
    const topY = spritesReady ? bodySpriteRect(p).top : y - p.r - 24;
    ctx.fillStyle = "#ffd76a";
    ctx.font = "bold 34px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("！", x, topY - 8 + bob);
  }

  // tension gauge while grabbing
  if (grab.active && grab.p === p) {
    const t = tailPos(p);
    const gw = 70, gh = 10;
    const gx = t.x - gw / 2, gy = t.y + 26;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(gx - 2, gy - 2, gw + 4, gh + 4);
    ctx.fillStyle = grab.tension > 0.75 ? "#ff6a8a" : "#ffd76a";
    ctx.fillRect(gx, gy, gw * grab.tension, gh);
    // hint arrow: pull opposite to flee direction
    const fleeA = p.angle;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(fleeA + Math.PI);
    ctx.strokeStyle = "rgba(255, 215, 106, 0.7)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(24, 0); ctx.lineTo(52, 0);
    ctx.moveTo(44, -7); ctx.lineTo(52, 0); ctx.lineTo(44, 7);
    ctx.stroke();
    ctx.restore();
  }
}

function drawPenguins() {
  // 手前(下)にいる個体を後から描く簡易デプスソート
  const sorted = [...penguins].sort((a, b) => a.y - b.y);
  for (const p of sorted) drawPenguin(p);
}

function drawEffects() {
  for (const r of rings) {
    const t = 1 - r.life / r.max; // 0→1
    ctx.globalAlpha = clamp(r.life / r.max, 0, 1);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3 * (1 - t) + 1;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 14 + t * 80, 0, Math.PI * 2);
    ctx.stroke();
    // 十字のグリント
    const len = 30 * (1 - t) + 6;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(r.x - len, r.y); ctx.lineTo(r.x + len, r.y);
    ctx.moveTo(r.x, r.y - len); ctx.lineTo(r.x, r.y + len);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const p of popups) {
    ctx.globalAlpha = clamp(p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.font = "bold 26px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawLegend() {
  // 画面隅の点数凡例（常時表示）
  const items = [VARIANTS.black, VARIANTS.red, VARIANTS.blue, VARIANTS.white];
  const y = H - 16;
  let x = 16;
  ctx.font = "bold 12px sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  for (const v of items) {
    ctx.fillStyle = v.ui;
    ctx.beginPath();
    ctx.arc(x + 5, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(234,246,255,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = "rgba(234,246,255,0.75)";
    const label = `${v.name}${v.points}`;
    ctx.fillText(label, x + 14, y + 1);
    x += 14 + ctx.measureText(label).width + 12;
  }
  ctx.textBaseline = "alphabetic";
}

function drawHUD() {
  ctx.fillStyle = "#eaf6ff";
  ctx.font = "bold 22px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(`スコア: ${game.score}`, 16, 34);
  ctx.textAlign = "right";
  const t = Math.ceil(game.time);
  ctx.fillStyle = t <= 10 ? "#ff6a8a" : "#eaf6ff";
  ctx.fillText(`のこり ${t} 秒`, W - 16, 34);
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(234,246,255,0.6)";
  ctx.font = "14px sans-serif";
  ctx.fillText(`ベスト: ${game.best}`, W / 2, 30);
}

// ---------- game flow ----------
const startOverlay = document.getElementById("startOverlay");
const endOverlay = document.getElementById("endOverlay");

// ---------- audio（Web Audioで自前生成。外部ファイル不要でオフライン動作） ----------
const AUDIO_KEY = "shippo-chigiri-sound";
const audio = {
  ctx: null, master: null, musicGain: null, sfxGain: null,
  enabled: localStorage.getItem(AUDIO_KEY) !== "off",
  musicTimer: null,
};

function initAudio() {
  if (audio.ctx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  audio.ctx = new AC();
  audio.master = audio.ctx.createGain();
  audio.master.gain.value = audio.enabled ? 1 : 0;
  audio.master.connect(audio.ctx.destination);
  audio.musicGain = audio.ctx.createGain();
  audio.musicGain.gain.value = 0.32;
  audio.musicGain.connect(audio.master);
  audio.sfxGain = audio.ctx.createGain();
  audio.sfxGain.gain.value = 0.5;
  audio.sfxGain.connect(audio.master);
}
function resumeAudio() {
  if (!audio.ctx) initAudio();
  if (audio.ctx && audio.ctx.state === "suspended") audio.ctx.resume();
}
const midiFreq = (n) => 440 * Math.pow(2, (n - 69) / 12);

// BGM: ゆるくてかわいいペンタトニックのループ（16ステップ=8分音符）
const MUSIC = {
  bpm: 116,
  melody: [76, null, 79, 81, 76, null, 74, 72, 69, null, 72, 74, 76, 79, 74, 72], // Aマイナー系
  bass:   [45, 40, 41, 40], // A2 / E2 / F2 / E2 相当（4ステップごと）
};
let musicStep = 0, musicNextTime = 0;

function playTone(freq, when, dur, type, peak, target) {
  const o = audio.ctx.createOscillator();
  const g = audio.ctx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, when);
  g.gain.linearRampToValueAtTime(peak, when + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
  o.connect(g); g.connect(target);
  o.start(when); o.stop(when + dur + 0.05);
}
function scheduleMusic() {
  if (!audio.ctx) return;
  const stepDur = 60 / MUSIC.bpm / 2;
  while (musicNextTime < audio.ctx.currentTime + 0.25) {
    const s = musicStep % 16;
    const m = MUSIC.melody[s];
    if (m !== null) playTone(midiFreq(m), musicNextTime, stepDur * 0.9, "triangle", 0.22, audio.musicGain);
    if (s % 2 === 0) playTone(midiFreq(MUSIC.bass[Math.floor(s / 4)]), musicNextTime, stepDur * 1.7, "sine", 0.28, audio.musicGain);
    if (s % 4 === 0) playTone(70, musicNextTime, 0.12, "sine", 0.5, audio.musicGain); // やわらかいキック
    musicNextTime += stepDur;
    musicStep++;
  }
}
function startMusic() {
  if (!audio.ctx || audio.musicTimer) return;
  musicStep = 0;
  musicNextTime = audio.ctx.currentTime + 0.1;
  audio.musicTimer = setInterval(scheduleMusic, 60);
}
function stopMusic() {
  if (audio.musicTimer) { clearInterval(audio.musicTimer); audio.musicTimer = null; }
}

// 引っ張られたときの「ぐーぐーガーガー」悲鳴（母音フォルマント合成）
const VOWEL_GU = [320, 720], VOWEL_GA = [780, 1150];
function screamSyllable(when, vowel, pitch, dur) {
  const o = audio.ctx.createOscillator();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(pitch, when);
  o.frequency.linearRampToValueAtTime(pitch * 1.08, when + dur); // 語尾を上げて悲鳴っぽく
  const lfo = audio.ctx.createOscillator();
  const lfoG = audio.ctx.createGain();
  lfo.frequency.value = 22; lfoG.gain.value = pitch * 0.04;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  const f1 = audio.ctx.createBiquadFilter();
  f1.type = "bandpass"; f1.frequency.value = vowel[0]; f1.Q.value = 7;
  const f2 = audio.ctx.createBiquadFilter();
  f2.type = "bandpass"; f2.frequency.value = vowel[1]; f2.Q.value = 9;
  const g = audio.ctx.createGain();
  g.gain.setValueAtTime(0.0001, when);
  g.gain.linearRampToValueAtTime(0.6, when + 0.025);
  g.gain.setValueAtTime(0.55, when + dur * 0.6);
  g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
  o.connect(f1); o.connect(f2);
  f1.connect(g); f2.connect(g); g.connect(audio.sfxGain);
  o.start(when); o.stop(when + dur + 0.05);
  lfo.start(when); lfo.stop(when + dur + 0.05);
}
function playScream(startWhen) {
  const syl = [
    { v: VOWEL_GU, p: 300, d: 0.15 },
    { v: VOWEL_GU, p: 330, d: 0.15 },
    { v: VOWEL_GA, p: 380, d: 0.17 },
    { v: VOWEL_GA, p: 450, d: 0.20 },
  ];
  let t = startWhen;
  for (const s of syl) { screamSyllable(t, s.v, s.p, s.d); t += s.d + 0.015; }
  return t;
}
let screamNextTime = 0;
function updateScream() {
  if (!audio.ctx || !audio.enabled) return;
  const held = grab.active && grab.p && grab.p.state === S.HOKAKU;
  if (held) {
    const now = audio.ctx.currentTime;
    if (screamNextTime < now + 0.05) {
      const end = playScream(Math.max(now + 0.02, screamNextTime));
      screamNextTime = end + 0.28; // 悲鳴の合間
    }
  } else {
    screamNextTime = 0;
  }
}

// しっぽがちぎれた瞬間の「プツン」（クリック感の"プ" + 一気に下がるピッチの"ツン"）
function playPluck() {
  if (!audio.ctx || !audio.enabled) return;
  const t = audio.ctx.currentTime + 0.001;

  // "プ": ごく短いノイズのスナップ（ハイパスで弾ける質感に）
  const len = Math.floor(audio.ctx.sampleRate * 0.05);
  const buf = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
  const nb = audio.ctx.createBufferSource();
  nb.buffer = buf;
  const hp = audio.ctx.createBiquadFilter();
  hp.type = "highpass"; hp.frequency.value = 1800;
  const ng = audio.ctx.createGain();
  ng.gain.setValueAtTime(0.55, t);
  ng.gain.exponentialRampToValueAtTime(0.0008, t + 0.05);
  nb.connect(hp); hp.connect(ng); ng.connect(audio.sfxGain);
  nb.start(t); nb.stop(t + 0.06);

  // "ツン": ピッチが一気に下がる撥弦っぽいトーン（速い減衰で気持ちよく）
  const o = audio.ctx.createOscillator();
  o.type = "triangle";
  o.frequency.setValueAtTime(900, t);
  o.frequency.exponentialRampToValueAtTime(150, t + 0.11);
  const g = audio.ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.5, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o.connect(g); g.connect(audio.sfxGain);
  o.start(t); o.stop(t + 0.2);
}

function setSound(on) {
  audio.enabled = on;
  localStorage.setItem(AUDIO_KEY, on ? "on" : "off");
  if (audio.master) audio.master.gain.value = on ? 1 : 0;
  const btn = document.getElementById("muteBtn");
  if (btn) btn.textContent = on ? "🔊" : "🔇";
}

{
  const muteBtn = document.getElementById("muteBtn");
  muteBtn.textContent = audio.enabled ? "🔊" : "🔇";
  muteBtn.addEventListener("click", () => { resumeAudio(); setSound(!audio.enabled); });
}

function startGame() {
  game.running = true;
  game.time = GAME_TIME;
  game.score = 0;
  game.combo = 0;
  grab.active = false;
  grab.p = null;
  grab.tension = 0;
  particles = [];
  popups = [];
  rings = [];
  penguins = [];
  while (penguins.length < MIN_PENGUINS) spawnPenguin();
  scheduleSpawn();
  startOverlay.classList.add("hidden");
  endOverlay.classList.add("hidden");
  resumeAudio();
  startMusic();
}

function endGame() {
  game.running = false;
  stopMusic();
  screamNextTime = 0;
  grab.active = false;
  grab.p = null;
  pointer.down = false;
  pointer.id = null;
  if (game.score > game.best) {
    game.best = game.score;
    localStorage.setItem(BEST_KEY, String(game.best));
  }
  document.getElementById("finalScore").textContent = game.score;
  document.getElementById("endBest").textContent = `ベストスコア: ${game.best}`;
  endOverlay.classList.remove("hidden");
}

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("retryBtn").addEventListener("click", startGame);
document.getElementById("bestLabel").textContent =
  game.best > 0 ? `ベストスコア: ${game.best}` : "";

// ---------- main loop ----------
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (game.running) {
    game.time -= dt;
    if (game.time <= 0) {
      game.time = 0;
      endGame();
    }
    updatePointer(dt);
    updatePenguins(dt);
    updateSpawner(dt);
    updateScream();
  }
  updateEffects(dt);

  drawBackground();
  drawPenguins();
  drawEffects();
  drawLegend();
  if (game.running) drawHUD();

  requestAnimationFrame(loop);
}
resetPenguins();
requestAnimationFrame(loop);
</script>
